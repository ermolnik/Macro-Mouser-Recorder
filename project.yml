name: Clicker
options:
  bundleIdPrefix: app.clicker
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
targets:
  Clicker:
    type: application
    platform: macOS
    sources:
      - path: Clicker
    info:
      path: Clicker/Resources/Info.plist
      properties:
        CFBundleName: Clicker
        CFBundleDisplayName: Clicker
        CFBundleIdentifier: app.clicker.Clicker
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
    entitlements:
      path: Clicker/Clicker.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.clicker.Clicker
        CODE_SIGN_ENTITLEMENTS: Clicker/Clicker.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Clicker/Resources/Info.plist
  ClickerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClickerTests
    dependencies:
      - target: Clicker
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Clicker.app/Contents/MacOS/Clicker"
schemes:
  Clicker:
    build:
      targets:
        Clicker: all
        ClickerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClickerTests
    archive:
      config: Release
